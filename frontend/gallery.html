<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Heritage Gallery — The JMT Legacy Archive</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body class="bg-surface">
    <main class="px-6 pt-16 lg:px-10">
      <header class="mx-auto max-w-7xl reveal">
        <p class="label-eyebrow">90th Anniversary Collection</p>
        <h1 class="display-hero mt-4 max-w-2xl">
          <span class="italic text-primary">Preserving</span> the moments that
          built a legacy.
        </h1>
        <p class="prose-archive mt-5 max-w-xl">
          Photographs gathered from nine decades of gatherings, journeys, and
          quiet afternoons. Select an era to narrow the collection.
        </p>
      </header>

      <!-- Era filters, derived from the photos themselves -->
      <div
        data-era-filters
        class="mx-auto mt-10 flex max-w-7xl flex-wrap gap-3"
      ></div>

      <!-- Masonry collection -->
      <section
        data-gallery-grid
        class="mx-auto mt-12 max-w-7xl gap-6 [column-fill:_balance] sm:columns-2 lg:columns-3"
      ></section>
    </main>

    <!-- Lightbox -->
    <div
      data-lightbox
      class="fixed inset-0 z-[70] hidden items-center justify-center bg-ink/85 p-4 backdrop-blur-sm sm:p-8"
      role="dialog"
      aria-modal="true"
      aria-label="Photograph detail"
    >
      <button
        data-lightbox-close
        class="absolute right-5 top-5 flex h-11 w-11 items-center justify-center rounded-full bg-surface/10 text-surface transition-colors hover:bg-surface/25"
        aria-label="Close"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 6l12 12M18 6L6 18" stroke-linecap="round" />
        </svg>
      </button>
      <div data-lightbox-body class="max-h-full w-full max-w-4xl overflow-y-auto"></div>
    </div>

    <script type="module" src="/src/js/gallery.js"></script>
  </body>
</html>
