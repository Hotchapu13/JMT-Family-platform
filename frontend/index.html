<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>The JMT Legacy Archive</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body class="bg-surface">
    <div class="grain-overlay"></div>

    <main class="relative flex min-h-screen items-center justify-center px-6 py-16">
      <!-- Warm radial wash behind the card, in place of a hero photograph -->
      <div
        class="pointer-events-none absolute inset-0 opacity-70"
        style="background: radial-gradient(ellipse at 50% 30%, #f5ebdc 0%, #fff8ef 55%, #fff8ef 100%)"
      ></div>

      <section class="relative w-full max-w-xl">
        <div class="mb-10 text-center">
          <span
            class="mx-auto mb-8 flex h-16 w-16 items-center justify-center rounded-full bg-primary font-display text-xl font-bold text-surface-lowest shadow-lift"
            >90</span
          >
          <p class="label-eyebrow">The 90th Milestone</p>
          <h1 class="display-hero mt-4">The JMT Legacy</h1>
          <p class="mt-3 font-display text-xl italic text-primary">A Living Archive</p>
          <div class="ornament my-8"><span class="text-sm">&#10047;</span></div>
          <p class="mx-auto max-w-md prose-archive !text-base">
            This archive is kept privately for the family. Please enter the access
            code shared with you to step inside.
          </p>
        </div>

        <form data-gateway-form class="card-exhibit" novalidate>
          <label
            for="access-code"
            class="label-eyebrow !text-ink-faint block"
            >Family Access Code</label
          >
          <input
            id="access-code"
            name="code"
            type="text"
            autocomplete="one-time-code"
            spellcheck="false"
            required
            placeholder="Enter your code"
            class="mt-3 w-full border-0 border-b border-outline bg-transparent px-0 py-3 font-display text-lg text-ink placeholder:text-ink-faint/60 focus:border-primary focus:outline-none focus:ring-0"
          />

          <p
            data-gateway-error
            role="alert"
            class="mt-4 hidden font-body text-sm text-primary"
          ></p>

          <button type="submit" data-gateway-submit class="btn-primary mt-8 w-full">
            <span data-submit-label>Enter the Archive</span>
          </button>
        </form>

        <p class="mt-8 text-center text-xs italic text-ink-faint">
          Codes expire periodically. If yours no longer works, please ask the
          family curator for a new one.
        </p>
      </section>
    </main>

    <script type="module" src="/src/js/gateway.js"></script>
  </body>
</html>
